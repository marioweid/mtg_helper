repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        entry: bash -c 'cd backend && uv run ruff check --fix src/ tests/'
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd backend && uv run ruff format src/ tests/'
        language: system
        types: [python]
        pass_filenames: false
