services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mtg_helper
      POSTGRES_USER: mtg
      POSTGRES_PASSWORD: mtg_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/mtg_helper/sql/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtg -d mtg_helper"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://mtg:mtg_dev@postgres:5432/mtg_helper
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      API_URL_INTERNAL: http://backend:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/lib:/app/lib
      - ./frontend/components:/app/components

  scryfall-sync:
    image: alpine/curl:latest
    entrypoint: >
      sh -c "
        echo 'Scryfall weekly sync cron started';
        while true; do
          sleep 604800;
          echo 'Running weekly Scryfall sync...';
          curl -sf -X POST http://backend:8000/api/v1/admin/sync-cards && echo 'Sync complete' || echo 'Sync failed';
        done
      "
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
